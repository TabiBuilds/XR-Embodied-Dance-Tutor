<head>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#09090b;font-family:'Space Grotesk',sans-serif;overflow:hidden}

/* ─ Top chrome ─ */
#chrome{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  height:52px;display:flex;align-items:center;gap:8px;padding:0 16px;
  background:rgba(9,9,11,.9);backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(190,255,0,.14);
}
.brand{color:#beff00;font-size:13px;font-weight:700;letter-spacing:-.4px;text-transform:uppercase;white-space:nowrap}
.divider{width:1px;height:22px;background:rgba(255,255,255,.12);flex-shrink:0}
.flow-lbl{color:rgba(195,202,173,.45);font-size:9.5px;letter-spacing:1.3px;text-transform:uppercase;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* step dots */
#stepdots{display:flex;align-items:center;gap:3px}
.sdot{
  width:20px;height:20px;border-radius:50%;border:1.5px solid rgba(190,255,0,.25);
  background:transparent;color:rgba(195,202,173,.4);font-size:8.5px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .22s;font-family:'Space Grotesk',sans-serif;
}
.sdot.active{border-color:#beff00;background:rgba(190,255,0,.18);color:#beff00}
.sdot.done{border-color:rgba(190,255,0,.38);background:rgba(190,255,0,.07);color:rgba(190,255,0,.55)}
.sline{width:12px;height:1px;background:rgba(190,255,0,.16);transition:background .22s}
.sline.done{background:rgba(190,255,0,.42)}

/* nav buttons */
.nbtn{
  padding:4px 11px;border-radius:14px;cursor:pointer;font-size:10.5px;
  font-family:'Space Grotesk',sans-serif;font-weight:600;
  border:1px solid rgba(190,255,0,.28);background:transparent;color:rgba(190,255,0,.6);
  transition:all .18s;white-space:nowrap;
}
.nbtn:hover{background:rgba(190,255,0,.1);color:#beff00}
.nbtn.pri{background:rgba(190,255,0,.85);color:#0c0e12;border-color:#beff00;font-weight:700}
.nbtn.pri:hover{background:#beff00}
#btnprev{opacity:.4}

/* step label */
#slabel{
  position:fixed;bottom:38px;left:50%;transform:translateX(-50%);z-index:1000;pointer-events:none;
  color:rgba(190,255,0,.6);font-size:10px;letter-spacing:1.6px;text-transform:uppercase;
  font-family:'Space Grotesk',sans-serif;font-weight:600;white-space:nowrap;
}
#hint{
  position:fixed;bottom:10px;left:50%;transform:translateX(-50%);z-index:1000;pointer-events:none;
  background:rgba(0,0,0,.45);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.06);
  border-radius:7px;padding:5px 14px;color:rgba(195,202,173,.45);font-size:9.5px;letter-spacing:.05em;white-space:nowrap;
}

/* genre selector overlay (step 3) */
#genre-overlay{
  position:fixed;bottom:58px;left:50%;transform:translateX(-50%);z-index:1000;
  display:none;align-items:center;gap:6px;flex-wrap:wrap;justify-content:center;
  padding:10px 18px;background:rgba(12,14,18,.82);backdrop-filter:blur(18px);
  border:1px solid rgba(190,255,0,.18);border-radius:30px;
}
#genre-overlay.show{display:flex}
.gchip{
  padding:4px 13px;border-radius:20px;cursor:pointer;font-size:10px;font-weight:600;
  font-family:'Space Grotesk',sans-serif;text-transform:uppercase;letter-spacing:.8px;
  border:1px solid rgba(190,255,0,.22);color:rgba(195,202,173,.55);background:transparent;
  transition:all .18s;
}
.gchip:hover,.gchip.sel{background:rgba(190,255,0,.15);border-color:#beff00;color:#beff00}
</style>
</head>

<!-- ─ Chrome ─ -->
<div id="chrome">

  <div class="divider"></div>

<!-- ════════════════════════════════════════════════════ JS ═══ -->
<script>
const STEPS = [
  { id:'step-1', label:'Welcome & Sign In' },
  { id:'step-2', label:'Choose Learning Mode' },
  { id:'step-3', label:'Select a Lesson' },
  { id:'step-4', label:'Haptic Bubble Setup' },
  { id:'step-5', label:'Sound & Accessories' },
  { id:'step-6', label:'Haptics Calibration' },
  { id:'step-7', label:'Sensory Preview' },
  { id:'step-8', label:'Begin Session' },
  { id:'step-9', label:'Inside the Bubble' },
];
let cur = 0;

function buildDots(){
  const c = document.getElementById('stepdots');
  c.innerHTML = '';
  STEPS.forEach((s,i) => {
    if(i>0){ const l=document.createElement('div'); l.className='sline'+(i<=cur?' done':''); l.id='sl'+i; c.appendChild(l); }
    const d=document.createElement('div');
    d.className='sdot'+(i===cur?' active':i<cur?' done':'');
    d.textContent=i+1; d.title=s.label; d.id='sd'+i; d.onclick=()=>go(i);
    c.appendChild(d);
  });
}
function upd(){
  STEPS.forEach((_,i)=>{
    const d=document.getElementById('sd'+i);
    if(d) d.className='sdot'+(i===cur?' active':i<cur?' done':'');
    if(i>0){ const l=document.getElementById('sl'+i); if(l) l.className='sline'+(i<=cur?' done':''); }
  });
  document.getElementById('slabel').textContent = `Step ${cur+1} of ${STEPS.length}  ·  ${STEPS[cur].label}`;
  document.getElementById('btnprev').style.opacity = cur===0?'.35':'1';
  document.getElementById('btnnext').textContent = cur===STEPS.length-1 ? 'Finish ✓' : 'Next →';
  // genre overlay only on step 3
  document.getElementById('genre-overlay').className = cur===2 ? 'show' : '';
}
function go(n){
  if(n<0||n>=STEPS.length) return;
  document.getElementById(STEPS[cur].id).setAttribute('visible','false');
  cur=n;
  document.getElementById(STEPS[cur].id).setAttribute('visible','true');
  upd();
}
function nextS(){ if(cur<STEPS.length-1) go(cur+1); }
function prevS(){ if(cur>0) go(cur-1); }
function selGenre(el){
  document.querySelectorAll('.gchip').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
}

// ── Register interactive hover/click component ────────────
AFRAME.registerComponent('xb',{
  init(){
    const el=this.el;
    el.addEventListener('mouseenter',()=>{
      el.setAttribute('animation__si',{property:'scale',to:'1.06 1.06 1.06',dur:140,easing:'easeOutQuad'});
    });
    el.addEventListener('mouseleave',()=>{
      el.setAttribute('animation__so',{property:'scale',to:'1 1 1',dur:140,easing:'easeOutQuad'});
    });
    el.addEventListener('click',()=>{
      const id=el.id;
      if(id==='s1-in')   go(1);
      if(id==='s2-ai')   go(2);
      if(id==='s2-xr')   go(2);
      if(['s3-lesson1','s3-lesson2','s3-lesson3'].includes(id)) go(3);
      if(['s4-sm','s4-md','s4-lg'].includes(id)) go(4);
      if(id==='s7-begin') go(7);
      if(id==='s7-recal') go(5); // back to calibration
      if(id==='s8-begin') go(8);
    });
  }
});

function wire(){
  document.querySelectorAll('.I').forEach(el=>{
    if(!el.components['xb']) el.setAttribute('xb','');
  });
}

// ── Stars ──────────────────────────────────────────────────
function mkStars(){
  const c=document.getElementById('stars');
  const cols=['#beff00','#00f4fe','#a3e635','#ffffff','#a78bfa'];
  for(let i=0;i<70;i++){
    const s=document.createElement('a-sphere');
    const t=Math.random()*Math.PI*2, p=Math.acos(2*Math.random()-1), r=15+Math.random()*9;
    s.setAttribute('position',{x:r*Math.sin(p)*Math.cos(t),y:r*Math.sin(p)*Math.sin(t),z:r*Math.cos(p)});
    s.setAttribute('radius',.01+Math.random()*.03);
    s.setAttribute('material',{color:cols[~~(Math.random()*cols.length)],opacity:.12+Math.random()*.5,transparent:true,shader:'flat'});
    s.setAttribute('animation',{property:'material.opacity',from:(.12+Math.random()*.45).toFixed(2),to:.02,dur:2800+Math.random()*6000,loop:true,dir:'alternate',easing:'easeInOutSine'});
    c.appendChild(s);
  }
}

document.querySelector('a-scene').addEventListener('loaded',()=>{
  mkStars(); buildDots(); upd(); wire(); go(0);
});
</script>
</body>
