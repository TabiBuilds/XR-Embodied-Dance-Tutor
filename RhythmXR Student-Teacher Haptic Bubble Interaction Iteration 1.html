
<h2 class="sr-only">RhythmXR: Student–teacher haptic bubble — animated scene-by-scene walkthrough of Phase 4 Embodied Learning</h2>

<div style="width:100%;font-family:var(--font-sans);">

  <svg id="rx-svg" width="100%" viewBox="0 0 680 360"
    style="display:block;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:12px;transition:opacity 0.25s ease;min-height:180px;"></svg>

  <div style="display:flex;align-items:center;gap:10px;padding:8px 2px 4px;">
    <span id="rx-n" style="font-size:12px;color:var(--color-text-secondary);white-space:nowrap;min-width:36px;"></span>
    <div style="flex:1;height:2px;background:var(--color-border-tertiary);border-radius:2px;overflow:hidden;">
      <div id="rx-bar" style="height:100%;background:#185FA5;transition:width 0.5s ease;width:0%;"></div>
    </div>
  </div>

  <div id="rx-title" style="font-size:15px;font-weight:500;color:var(--color-text-primary);padding:0 0 3px;min-height:20px;"></div>
  <div id="rx-cap" style="font-size:13px;color:var(--color-text-secondary);line-height:1.6;min-height:48px;padding:0 0 10px;"></div>

  <div style="display:flex;align-items:center;gap:8px;">
    <button onclick="rxP()">← Prev</button>
    <button id="rx-pb" onclick="rxT()">⏸ Pause</button>
    <button onclick="rxN()">Next →</button>
    <div style="flex:1;"></div>
    <div id="rx-dots" style="display:flex;gap:6px;align-items:center;"></div>
  </div>

</div>

<script>

const SCENES = [
  {
    title:"Entering the shared bubble",
    caption:"Teacher and student arrive in separate bubbles. A soft elastic collision — two spaces merge into one shared presence. The greeting moment: eye contact before the work begins.",
    fn: s1
  },
  {
    title:"Teacher demonstrates the move",
    caption:"The teacher demonstrates from inside the shared space. The student observes from their chosen vantage — in front, beside, or mirrored. The voice channel is always open.",
    fn: s2
  },
  {
    title:"Student attempts the move",
    caption:"The student tries the move. The posture–rhythm–haptics triad glows softly at the edge of awareness — ambient, not intrusive. The teacher observes from any angle.",
    fn: s3
  },
  {
    title:"Haptic correction",
    caption:"The teacher 'touches' the student's hip. A gentle directional pulse — felt, not seen — says: shift your weight here. Neither side has unilateral control.",
    fn: s4
  },
  {
    title:"Stuck? Slow time activated",
    caption:"\"Can we slow down?\" Tempo drops to 50%. A ghost mirror overlay shows the student their form alongside the teacher's correct shape — no judgment, just information.",
    fn: s5
  },
  {
    title:"Session close",
    caption:"The teacher signals cool-down. Lighter haptics, slower music. Bubbles part gently. One quiet question surfaces: How did that feel? This is the beginning of reflection.",
    fn: s6
  }
];

let cur=0, playing=true, tmr=null;

function rxGo(i) {
  cur=i;
  const svg=document.getElementById('rx-svg');
  svg.style.opacity='0';
  setTimeout(()=>{ svg.innerHTML=SCENES[i].fn(); svg.style.opacity='1'; },220);
  document.getElementById('rx-n').textContent=(i+1)+' / '+SCENES.length;
  document.getElementById('rx-bar').style.width=((i+1)/SCENES.length*100)+'%';
  document.getElementById('rx-title').textContent=SCENES[i].title;
  document.getElementById('rx-cap').textContent=SCENES[i].caption;
  document.querySelectorAll('.rx-dot').forEach((d,j)=>{
    d.style.background = j===i ? '#185FA5' : 'var(--color-border-tertiary)';
    d.style.transform = j===i ? 'scale(1.3)' : 'scale(1)';
  });
}
function rxN(){ rxGo((cur+1)%SCENES.length); if(playing) rxRst(); }
function rxP(){ rxGo((cur-1+SCENES.length)%SCENES.length); if(playing) rxRst(); }
function rxT(){
  playing=!playing;
  document.getElementById('rx-pb').textContent=playing?'⏸ Pause':'▶ Play';
  playing?rxRst():clearInterval(tmr);
}
function rxRst(){ clearInterval(tmr); tmr=setInterval(()=>rxGo((cur+1)%SCENES.length),6500); }

(function(){
  const d=document.getElementById('rx-dots');
  SCENES.forEach((_,i)=>{
    const el=document.createElement('div');
    el.className='rx-dot';
    el.style.cssText='width:7px;height:7px;border-radius:50%;cursor:pointer;border:0.5px solid var(--color-border-secondary);transition:background 0.2s,transform 0.2s;';
    el.onclick=()=>{ rxGo(i); if(playing) rxRst(); };
    d.appendChild(el);
  });
  rxGo(0);
  rxRst();
})();

  const hY=y-52, nY=y-36, shY=y-22, hipY=y+12;

<circle cx="${x}" cy="${hY}" r="14" fill="${col}"/>

<line x1="${x}" y1="${shY}" x2="${larmX2}" y2="${larmY2}" stroke="${col}" stroke-width="2.5" stroke-linecap="round"/>
<line x1="${x}" y1="${shY}" x2="${rarmX2}" y2="${rarmY2}" stroke="${col}" stroke-width="2.5" stroke-linecap="round"/>
<line x1="${x}" y1="${hipY}" x2="${x-16}" y2="${y+50}" stroke="${col}" stroke-width="2.5" stroke-linecap="round"/>

}
