<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>RhythmXR — Learning Space Setup</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Encode+Sans+Semi+Expanded:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:1280px;min-height:900px;background:#0d0d1a;font-family:'Encode Sans Semi Expanded',sans-serif;color:#fff;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 70% at 65% 50%,rgba(11,113,137,0.2) 0%,transparent 65%),radial-gradient(ellipse 40% 40% at 20% 30%,rgba(93,46,140,0.18) 0%,transparent 60%);pointer-events:none;}
.top-nav{background:#5D2E8C;display:flex;width:100%;position:relative;z-index:10;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:11px 4px 10px;gap:4px;cursor:pointer;border-right:1px solid rgba(255,255,255,0.1);}
.nav-item:last-child{border-right:none;}
.nav-item svg{width:16px;height:16px;fill:rgba(255,255,255,0.8);}
.nav-label{font-size:9px;letter-spacing:1px;font-weight:600;color:rgba(255,255,255,0.8);}
.nav-item.active svg{fill:#CCFF66;}
.nav-item.active .nav-label{color:#CCFF66;}
.layout{display:grid;grid-template-columns:400px 1fr;min-height:820px;position:relative;z-index:1;}
.left-panel{padding:56px 48px;border-right:1px solid rgba(255,255,255,0.07);display:flex;flex-direction:column;}
.eyebrow{font-size:9px;letter-spacing:2px;color:rgba(204,255,102,0.8);font-weight:600;margin-bottom:8px;}
.panel-title{font-family:'Fredoka',sans-serif;font-size:38px;font-weight:600;line-height:1.1;margin-bottom:8px;}
.panel-sub{font-size:11px;color:rgba(255,255,255,0.45);line-height:1.6;margin-bottom:32px;}
.bubble-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;flex:1;}
.bubble-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:20px;cursor:pointer;display:flex;flex-direction:column;align-items:center;text-align:center;}
.bubble-card.selected{border-color:#0B7189;background:rgba(11,113,137,0.15);}
.bubble-visual{margin-bottom:14px;display:flex;align-items:center;justify-content:center;height:80px;}
.bubble-ring{border-radius:50%;border:2px solid rgba(11,113,137,0.6);}
.bubble-card.selected .bubble-ring{border-color:#0B7189;box-shadow:0 0 20px rgba(11,113,137,0.3);}
.bubble-name{font-family:'Fredoka',sans-serif;font-size:16px;font-weight:600;margin-bottom:3px;}
.bubble-radius{font-size:10px;color:rgba(255,255,255,0.45);letter-spacing:0.5px;}
.custom-icon{width:32px;height:32px;border:2px dashed rgba(255,255,255,0.3);border-radius:50%;display:flex;align-items:center;justify-content:center;}
.custom-icon svg{width:14px;height:14px;fill:rgba(255,255,255,0.4);}
.cta-wrap{margin-top:24px;}
.btn-cta{width:100%;background:#5D2E8C;border:none;border-radius:8px;padding:16px;color:#fff;font-family:'Encode Sans Semi Expanded',sans-serif;font-size:11px;letter-spacing:1.5px;font-weight:600;cursor:pointer;}
.right-panel{display:flex;align-items:center;justify-content:center;position:relative;}
.viz-wrap{position:relative;width:480px;height:480px;}
.ring{position:absolute;border-radius:50%;border:1px solid;top:50%;left:50%;transform:translate(-50%,-50%);}
.ring-1{width:480px;height:480px;border-color:rgba(11,113,137,0.25);}
.ring-2{width:336px;height:336px;border-color:rgba(11,113,137,0.35);}
.ring-3{width:192px;height:192px;border-color:rgba(11,113,137,0.5);}
.ring-active{border-color:#0B7189;width:336px;height:336px;}
.radius-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.radius-num{font-family:'Fredoka',sans-serif;font-size:32px;font-weight:600;color:#0B7189;}
.radius-unit{font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:1px;}
.ring-dot{position:absolute;width:10px;height:10px;border-radius:50%;background:#0B7189;top:50%;left:50%;transform:translate(-50%,-50%);}
.ring-dot-top{top:calc(50% - 168px);left:50%;transform:translateX(-50%);}
.ring-dot-right{right:calc(50% - 168px);top:50%;transform:translateY(-50%);}
.ring-dot-bottom{bottom:calc(50% - 168px);left:50%;transform:translateX(-50%);}
.ring-dot-left{left:calc(50% - 168px);top:50%;transform:translateY(-50%);}
.silhouette{position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);width:80px;height:160px;background:rgba(255,255,255,0.08);border-radius:50% 50% 30% 30% / 60% 60% 40% 40%;opacity:0.5;}
.ground-plane{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);width:200px;height:8px;background:rgba(11,113,137,0.2);border-radius:50%;}
</style>
</head>
<body>
<nav class="top-nav">
  <div class="nav-item">
    <svg viewBox="0 0 24 24"><path d="M3 12L12 3l9 9v9a1 1 0 01-1 1h-5v-6H9v6H4a1 1 0 01-1-1z"/></svg>
    <span class="nav-label">HOME</span>
  </div>
  <div class="nav-item">
    <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 016.5 17H20M6 2h12a2 2 0 012 2v16a2 2 0 01-2 2H6a2 2 0 01-2-2V4a2 2 0 012-2z"/></svg>
    <span class="nav-label">LIBRARY</span>
  </div>
  <div class="nav-item active">
    <svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
    <span class="nav-label">LEARN</span>
  </div>
  <div class="nav-item">
    <svg viewBox="0 0 24 24"><path d="M4 20h4V10H4zM10 20h4V4h-4zM16 20h4v-6h-4z"/></svg>
    <span class="nav-label">STATS</span>
  </div>
  <div class="nav-item">
    <svg viewBox="0 0 24 24"><path d="M12 12a5 5 0 100-10 5 5 0 000 10zm-7 8a7 7 0 1114 0H5z"/></svg>
    <span class="nav-label">PROFILE</span>
  </div>
</nav>

<div class="layout">
  <div class="left-panel">
    <div class="eyebrow">SPATIAL BOUNDARY</div>
    <div class="panel-title">Select your<br>Bubble</div>
    <div class="panel-sub">Define your kinetic space. Calibrate your safety bubble to ensure fluid movement during high-intensity sequences.</div>
    <div class="bubble-grid">
      <div class="bubble-card">
        <div class="bubble-visual"><div class="bubble-ring" style="width:48px;height:48px;"></div></div>
        <div class="bubble-name">Small</div>
        <div class="bubble-radius">1.5M RADIUS</div>
      </div>
      <div class="bubble-card selected">
        <div class="bubble-visual"><div class="bubble-ring" style="width:64px;height:64px;"></div></div>
        <div class="bubble-name">Medium</div>
        <div class="bubble-radius">2.5M RADIUS</div>
      </div>
      <div class="bubble-card">
        <div class="bubble-visual"><div class="bubble-ring" style="width:76px;height:76px;"></div></div>
        <div class="bubble-name">Large</div>
        <div class="bubble-radius">4.0M RADIUS</div>
      </div>
      <div class="bubble-card">
        <div class="bubble-visual"><div class="custom-icon"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round" fill="none"/></svg></div></div>
        <div class="bubble-name">Custom</div>
        <div class="bubble-radius">SET MANUALLY</div>
      </div>
    </div>
    <div class="cta-wrap">
      <button class="btn-cta">CONTINUE WITH HAPTIC CALIBRATION</button>
    </div>
  </div>

  <div class="right-panel">
    <div class="viz-wrap">
      <div class="ring ring-1"></div>
      <div class="ring ring-2 ring-active"></div>
      <div class="ring ring-3"></div>
      <div class="ring-dot ring-dot-top"></div>
      <div class="ring-dot ring-dot-right"></div>
      <div class="ring-dot ring-dot-bottom"></div>
      <div class="ring-dot ring-dot-left"></div>
      <div style="position:absolute;top:calc(50% - 148px);left:50%;transform:translateX(-50%);background:rgba(11,113,137,0.2);border:1px solid rgba(11,113,137,0.5);border-radius:4px;padding:3px 10px;font-size:9px;letter-spacing:1px;color:#7fe0ef;white-space:nowrap;">2.5M RADIUS</div>
      <div class="silhouette"></div>
      <div class="ground-plane"></div>
      <div class="radius-label">
        <div class="radius-num">2.5M</div>
        <div class="radius-unit">MEDIUM BUBBLE</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
