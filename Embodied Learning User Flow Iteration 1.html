<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RhythmXR — Embodied Learning</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0c0e12; font-family: 'Space Grotesk', sans-serif; overflow: hidden; }

    #nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 999;
      display: flex; align-items: center; gap: 8px;
      padding: 10px 20px;
      background: rgba(12,14,18,0.82);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(190,255,0,0.2);
    }
    .brand { color: #beff00; font-size: 15px; font-weight: 700; letter-spacing: -0.5px; margin-right: 10px; }
    .dot   { width: 5px; height: 5px; border-radius: 50%; background: #beff00; margin-right: 6px; }
    .beta  { color: rgba(195,202,173,0.55); font-size: 10px; letter-spacing: 1.2px; text-transform: uppercase; margin-right: auto; }
    .nav-btn {
      padding: 5px 14px; border-radius: 20px; cursor: pointer; font-size: 11px;
      letter-spacing: 0.05em; font-family: 'Space Grotesk', sans-serif;
      border: 1px solid rgba(190,255,0,0.3); background: transparent; color: rgba(190,255,0,0.6);
      transition: all 0.2s;
    }
    .nav-btn:hover  { background: rgba(190,255,0,0.12); color: #beff00; }
    .nav-btn.active { background: rgba(190,255,0,0.22); color: #beff00; border-color: #beff00; }

    #hint {
      position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
      z-index: 999; pointer-events: none;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 8px;
      padding: 7px 18px; color: rgba(195,202,173,0.6); font-size: 11px; letter-spacing: 0.05em;
      white-space: nowrap;
    }
  </style>
</head>
<body>

<nav id="nav">
  <span class="brand">RhythmXR</span>
  <span class="dot"></span>
  <span class="beta">V2.04 Beta</span>
  <button class="nav-btn active" onclick="goScene('begin')">1 · Begin Lesson</button>
  <button class="nav-btn"        onclick="goScene('bubble')">2 · Haptic Bubble</button>
  <button class="nav-btn"        onclick="goScene('studio')">3 · Dance Studio</button>
  <button class="nav-btn"        onclick="goScene('replay')">4 · Memory Replay</button>
</nav>
<div id="hint">🖱 Drag to look around &nbsp;·&nbsp; Click glowing objects to interact &nbsp;·&nbsp; WASD to move</div>

<a-scene
  vr-mode-ui="enabled: true"
  renderer="colorManagement: true; antialias: true"
  background="color: #0c0e12"
>
  <!-- ── Figma assets from local MCP server ── -->
  <a-assets timeout="12000">
    <img id="img-bg-lesson" src="http://localhost:3845/assets/1f3584ee3a773cfea7a92f4a54283615ea85a142.png" crossorigin="anonymous">
    <img id="img-bg-studio" src="http://localhost:3845/assets/43eb233e7bd64ed4130efd59587188bd4f623bff.png" crossorigin="anonymous">
    <img id="img-tutor"     src="http://localhost:3845/assets/ae0e7b264a734734f5a766debe1942911794ae1d.png" crossorigin="anonymous">
  </a-assets>

  <!-- ── Shared: star particles (filled by JS) ── -->
  <a-entity id="stars"></a-entity>

  <!-- ── Shared: dark floor + green grid ── -->
  <a-plane rotation="-90 0 0" width="60" height="60" material="color:#0c0e12"></a-plane>
  <a-plane rotation="-90 0 0" width="60" height="60" position="0 0.002 0"
    material="color:#beff00; wireframe:true; opacity:0.055; transparent:true"></a-plane>


  <!-- ═══════════════════════════════════════════════════════════
       SCENE 1: BEGIN LESSON
  ════════════════════════════════════════════════════════════ -->
  <a-entity id="scene-begin">

    <a-sky color="#0d0f15"></a-sky>

    <!-- Figma living-room background wrapped around user as a cylinder -->
    <a-cylinder src="#img-bg-lesson" radius="18" height="12"
      open-ended="true" side="back" position="0 2 0"
      material="shader:flat; opacity:0.42; transparent:true"></a-cylinder>

    <!-- Main HUD — Figma "Spatial HUD / Focused Content Plate" -->
    <a-entity position="0 1.6 -4">

      <!-- Panel -->
      <a-plane width="3.4" height="2.4"
        material="color:#111317; opacity:0.84; transparent:true"></a-plane>
      <!-- Subtle outer glow border -->
      <a-plane width="3.44" height="2.44"
        material="color:#beff00; opacity:0.1; transparent:true"
        position="0 0 -0.004"></a-plane>

      <!-- Badge: HAPTIC FLOW MODULE -->
      <a-plane width="1.2" height="0.135"
        material="color:rgba(0,244,254,0.14); opacity:1; transparent:true"
        position="0 0.93 0.01"></a-plane>
      <a-text value="HAPTIC FLOW MODULE" align="center" width="2.8"
        color="#00f4fe" position="0 0.93 0.02" wrap-count="28"></a-text>

      <!-- Subheadline: Tutor Learn -->
      <a-text value="Tutor Learn" align="center" width="4" color="#ffffff"
        position="0 0.66 0.02" wrap-count="18"></a-text>

      <!-- Body copy -->
      <a-text value="Synchronize your neural pathways with high-fidelity&#10;haptic feedback. Experience the future of&#10;spatial dance instruction."
        align="center" width="3.1" color="#c3caad"
        position="0 0.3 0.02" wrap-count="46"></a-text>

      <!-- BEGIN SESSION button -->
      <a-entity id="btn-begin-session" class="interactive" position="0 -0.3 0.02">
        <!-- Pulse ring -->
        <a-torus radius="0.58" radius-tubular="0.012" color="#a1d800" opacity="0.22"
          animation="property:scale; from:1 1 1; to:1.4 1.4 1; dur:1600; loop:true; dir:alternate; easing:easeInOutSine"
          animation__o="property:material.opacity; from:0.22; to:0; dur:1600; loop:true; dir:alternate"></a-torus>
        <!-- Button bg -->
        <a-plane width="2.3" height="0.42"
          material="color:#111317; opacity:0.92; transparent:true"></a-plane>
        <a-plane width="2.32" height="0.44"
          material="color:rgba(255,255,255,0.07); opacity:1; transparent:true"
          position="0 0 -0.003"></a-plane>
        <!-- Lime circle -->
        <a-sphere radius="0.17" material="color:#a1d800"
          position="0.82 0 0.01"
          animation="property:material.color; from:#a1d800; to:#beff00; dur:900; loop:true; dir:alternate"></a-sphere>
        <a-text value="BEGIN SESSION" align="left" width="1.8" color="#a1d800"
          position="-0.62 0.09 0.01" wrap-count="22"></a-text>
        <a-text value="Initialize Flow" align="left" width="1.6" color="#ffffff"
          position="-0.62 -0.1 0.01" wrap-count="20"></a-text>
      </a-entity>

      <!-- Bento cards row -->
      <!-- Card 1: Intensity -->
      <a-entity position="-1.1 -0.95 0.02">
        <a-plane width="1.0" height="0.44" material="color:#111317; opacity:0.9; transparent:true"></a-plane>
        <a-plane width="1.0" height="0.44" material="color:rgba(255,255,255,0.05); opacity:1; transparent:true" position="0 0 -0.002"></a-plane>
        <a-text value="INTENSITY" align="left" width="1.1" color="rgba(255,255,255,0.45)" position="-0.44 0.12 0.01" wrap-count="14"></a-text>
        <a-text value="85%" align="left" width="1.2" color="#ffffff" position="-0.44 -0.04 0.01" wrap-count="8"></a-text>
        <a-plane width="0.85" height="0.03" material="color:rgba(255,255,255,0.1); opacity:1; transparent:true" position="-0.015 -0.16 0.01"></a-plane>
        <a-plane width="0.72" height="0.03" material="color:#a1d800; opacity:1" position="-0.075 -0.16 0.012"></a-plane>
      </a-entity>

      <!-- Card 2: Sync -->
      <a-entity position="0 -0.95 0.02">
        <a-plane width="1.0" height="0.44" material="color:#111317; opacity:0.9; transparent:true"></a-plane>
        <a-plane width="1.0" height="0.44" material="color:rgba(255,255,255,0.05); opacity:1; transparent:true" position="0 0 -0.002"></a-plane>
        <a-text value="SYNC MODE" align="left" width="1.1" color="rgba(255,255,255,0.45)" position="-0.44 0.12 0.01" wrap-count="14"></a-text>
        <a-text value="ADAPTIVE" align="left" width="1.2" color="#ffffff" position="-0.44 -0.03 0.01" wrap-count="12"></a-text>
        <a-text value="READY" align="left" width="0.9" color="#a1d800" position="-0.44 -0.16 0.01" wrap-count="10"></a-text>
      </a-entity>

      <!-- Card 3: Time -->
      <a-entity position="1.1 -0.95 0.02">
        <a-plane width="1.0" height="0.44" material="color:#111317; opacity:0.9; transparent:true"></a-plane>
        <a-plane width="1.0" height="0.44" material="color:rgba(255,255,255,0.05); opacity:1; transparent:true" position="0 0 -0.002"></a-plane>
        <a-text value="EST. TIME" align="left" width="1.1" color="rgba(255,255,255,0.45)" position="-0.44 0.12 0.01" wrap-count="14"></a-text>
        <a-text value="12:40" align="left" width="1.2" color="#ffffff" position="-0.44 -0.03 0.01" wrap-count="8"></a-text>
        <a-text value="HIGH INTENSITY" align="left" width="1.0" color="rgba(195,202,173,0.42)" position="-0.44 -0.16 0.01" wrap-count="18"></a-text>
      </a-entity>

    </a-entity>

    <!-- Corner trackers -->
    <a-entity position="0 1.6 -4">
      <a-plane width="0.3" height="0.025" material="color:rgba(255,255,255,0.2); transparent:true" position="-1.84 1.32 0.01"></a-plane>
      <a-plane width="0.025" height="0.3" material="color:rgba(255,255,255,0.2); transparent:true" position="-1.84 1.32 0.01"></a-plane>
      <a-plane width="0.3" height="0.025" material="color:rgba(255,255,255,0.2); transparent:true" position="1.84 1.32 0.01"></a-plane>
      <a-plane width="0.025" height="0.3" material="color:rgba(255,255,255,0.2); transparent:true" position="1.84 1.32 0.01"></a-plane>
      <a-plane width="0.3" height="0.025" material="color:rgba(255,255,255,0.2); transparent:true" position="-1.84 -1.32 0.01"></a-plane>
      <a-plane width="0.025" height="0.3" material="color:rgba(255,255,255,0.2); transparent:true" position="-1.84 -1.32 0.01"></a-plane>
      <a-plane width="0.3" height="0.025" material="color:rgba(255,255,255,0.2); transparent:true" position="1.84 -1.32 0.01"></a-plane>
      <a-plane width="0.025" height="0.3" material="color:rgba(255,255,255,0.2); transparent:true" position="1.84 -1.32 0.01"></a-plane>
    </a-entity>

    <!-- Left side card (visible when looking left) -->
    <a-entity position="-5 1.6 -2" rotation="0 32 0">
      <a-plane width="1.8" height="1.1" material="color:#111317; opacity:0.75; transparent:true"></a-plane>
      <a-plane width="0.04" height="1.1" material="color:#00f4fe; opacity:1" position="-0.88 0 0.005"></a-plane>
      <a-text value="SESSION #47" align="left" width="1.7" color="rgba(255,255,255,0.45)" position="-0.65 0.35 0.01" wrap-count="18"></a-text>
      <a-text value="Shuffling:&#10;Double Step" align="left" width="1.8" color="#ffffff" position="-0.65 0.06 0.01" wrap-count="16"></a-text>
      <a-text value="128 BPM" align="left" width="1.4" color="#00f4fe" position="-0.65 -0.3 0.01" wrap-count="12"></a-text>
    </a-entity>

    <!-- Right glowing orb -->
    <a-entity position="5 1.8 -2" rotation="0 -32 0">
      <a-sphere radius="0.55" material="color:#beff00; opacity:0.055; transparent:true; side:double"
        animation="property:scale; from:1 1 1; to:1.12 1.12 1.12; dur:2400; loop:true; dir:alternate"></a-sphere>
      <a-torus radius="0.55" radius-tubular="0.009" color="#beff00" opacity="0.38"
        animation="property:rotation; to:0 360 0; dur:9000; loop:true; easing:linear"></a-torus>
      <a-torus radius="0.55" radius-tubular="0.007" color="#00f4fe" opacity="0.28" rotation="90 0 0"
        animation="property:rotation; to:90 0 360; dur:13000; loop:true; easing:linear"></a-torus>
    </a-entity>

  </a-entity>


  <!-- ═══════════════════════════════════════════════════════════
       SCENE 2: HAPTIC BUBBLE
  ════════════════════════════════════════════════════════════ -->
  <a-entity id="scene-bubble" visible="false">

    <a-sky color="#07081a"></a-sky>

    <a-entity position="0 2.9 -4.8">
      <a-plane width="3.6" height="0.55" material="color:#111317; opacity:0.88; transparent:true"></a-plane>
      <a-text value="Select Your Haptic Bubble" align="center" width="3.8" color="#ffffff" position="0 0.1 0.01" wrap-count="36"></a-text>
      <a-text value="The bubble defines your XR movement space" align="center" width="3.2" color="#c3caad" position="0 -0.12 0.01" wrap-count="46"></a-text>
    </a-entity>

    <!-- SMALL -->
    <a-entity id="b-small" class="interactive" position="-3.6 1.5 -5.2">
      <a-sphere radius="0.65" material="color:#beff00; opacity:0.07; transparent:true; side:double"></a-sphere>
      <a-torus radius="0.65" radius-tubular="0.008" color="#beff00" opacity="0.5"
        animation="property:rotation; to:0 360 0; dur:8000; loop:true; easing:linear"></a-torus>
      <a-torus radius="0.65" radius-tubular="0.006" color="#00f4fe" opacity="0.3" rotation="90 0 0"
        animation="property:rotation; to:90 0 360; dur:12000; loop:true; easing:linear"></a-torus>
      <a-text value="SMALL" align="center" width="1.2" color="#beff00" position="0 -0.95 0" wrap-count="10"></a-text>
      <a-text value="~1 m radius" align="center" width="1.1" color="#c3caad" position="0 -1.15 0" wrap-count="14"></a-text>
    </a-entity>

    <!-- MEDIUM (default selected) -->
    <a-entity id="b-medium" class="interactive" position="0 1.5 -5.8">
      <a-sphere radius="1.05" material="color:#beff00; opacity:0.065; transparent:true; side:double"
        animation="property:scale; from:1 1 1; to:1.04 1.04 1.04; dur:2000; loop:true; dir:alternate"></a-sphere>
      <a-torus radius="1.05" radius-tubular="0.018" color="#beff00" opacity="0.55"
        animation="property:rotation; to:0 360 0; dur:10000; loop:true; easing:linear"
        animation__p="property:material.opacity; from:0.55; to:0.9; dur:1200; loop:true; dir:alternate"></a-torus>
      <a-torus radius="1.05" radius-tubular="0.01" color="#00f4fe" opacity="0.38" rotation="90 0 0"
        animation="property:rotation; to:90 0 360; dur:15000; loop:true; easing:linear"></a-torus>
      <a-plane width="0.7" height="0.12" material="color:#beff00; opacity:0.9; transparent:true" position="0 1.4 0"></a-plane>
      <a-text value="SELECTED" align="center" width="0.85" color="#0c0e12" position="0 1.4 0.01" wrap-count="12"></a-text>
      <a-text value="MEDIUM" align="center" width="1.2" color="#beff00" position="0 -1.35 0" wrap-count="10"></a-text>
      <a-text value="~2 m radius" align="center" width="1.1" color="#c3caad" position="0 -1.55 0" wrap-count="14"></a-text>
    </a-entity>

    <!-- LARGE -->
    <a-entity id="b-large" class="interactive" position="3.6 1.5 -5.2">
      <a-sphere radius="1.45" material="color:#00f4fe; opacity:0.045; transparent:true; side:double"></a-sphere>
      <a-torus radius="1.45" radius-tubular="0.011" color="#00f4fe" opacity="0.42"
        animation="property:rotation; to:0 360 0; dur:12000; loop:true; easing:linear"></a-torus>
      <a-torus radius="1.45" radius-tubular="0.009" color="#beff00" opacity="0.22" rotation="90 0 0"
        animation="property:rotation; to:90 0 360; dur:17000; loop:true; easing:linear"></a-torus>
      <a-text value="LARGE" align="center" width="1.2" color="#00f4fe" position="0 -1.68 0" wrap-count="10"></a-text>
      <a-text value="~3 m radius" align="center" width="1.1" color="#c3caad" position="0 -1.88 0" wrap-count="14"></a-text>
    </a-entity>

    <a-text value="or  CUSTOM" align="center" width="1.0" color="rgba(195,202,173,0.38)" position="0 0.32 -4.8" wrap-count="14"></a-text>

    <!-- Confirm -->
    <a-entity id="btn-confirm-bubble" class="interactive" position="0 -0.42 -4.2">
      <a-plane width="2.0" height="0.27" material="color:#beff00; opacity:0.9; transparent:true"></a-plane>
      <a-text value="CONFIRM AND CONTINUE" align="center" width="2.4" color="#0c0e12" position="0 0 0.01" wrap-count="28"></a-text>
    </a-entity>

  </a-entity>


  <!-- ═══════════════════════════════════════════════════════════
       SCENE 3: DANCE STUDIO
  ════════════════════════════════════════════════════════════ -->
  <a-entity id="scene-studio" visible="false">

    <a-sky color="#0c0e12"></a-sky>

    <!-- Studio bg from Figma -->
    <a-cylinder src="#img-bg-studio" radius="18" height="12"
      open-ended="true" side="back" position="0 2 0"
      material="shader:flat; opacity:0.22; transparent:true"></a-cylinder>

    <!-- Haptic bubble around user -->
    <a-sphere position="0 1.4 0" radius="2.3"
      material="color:#beff00; opacity:0.038; transparent:true; side:double"></a-sphere>
    <a-torus position="0 1.4 0" radius="2.3" radius-tubular="0.015"
      color="#beff00" opacity="0.2"
      animation="property:rotation; to:0 360 0; dur:22000; loop:true; easing:linear"
      animation__p="property:material.opacity; from:0.2; to:0.44; dur:2200; loop:true; dir:alternate"></a-torus>
    <a-torus position="0 1.4 0" radius="2.3" radius-tubular="0.011"
      color="#00f4fe" opacity="0.13" rotation="90 0 0"
      animation="property:rotation; to:90 0 360; dur:31000; loop:true; easing:linear"></a-torus>

    <!-- Floor: dark studio surface -->
    <a-plane rotation="-90 0 0" width="22" height="22"
      material="color:#0d1020" position="0 0.003 -2"></a-plane>
    <!-- Grid columns — Figma "Perspective Grid Lines" -->
    <a-plane rotation="-90 0 0" width="0.014" height="22" position="-6 0.005 -2"
      material="color:rgba(255,255,255,0.22); transparent:true"></a-plane>
    <a-plane rotation="-90 0 0" width="0.014" height="22" position="-3 0.005 -2"
      material="color:rgba(255,255,255,0.22); transparent:true"></a-plane>
    <a-plane rotation="-90 0 0" width="0.014" height="22" position="0 0.005 -2"
      material="color:rgba(255,255,255,0.22); transparent:true"></a-plane>
    <a-plane rotation="-90 0 0" width="0.014" height="22" position="3 0.005 -2"
      material="color:rgba(255,255,255,0.22); transparent:true"></a-plane>
    <a-plane rotation="-90 0 0" width="0.014" height="22" position="6 0.005 -2"
      material="color:rgba(255,255,255,0.22); transparent:true"></a-plane>
    <!-- Horizon line: Figma "HorizontalBorder" -->
    <a-plane rotation="-90 0 0" width="22" height="0.014" position="0 0.006 -4.5"
      material="color:rgba(190,255,0,0.2); transparent:true"></a-plane>

    <!-- Glowing Step Zones — Figma: L=#beff00, R=#00f4fe -->
    <a-entity id="zone-L" class="interactive" position="-1.9 0.02 -2.6">
      <a-plane rotation="-90 0 0" width="1.15" height="1.15"
        material="color:#beff00; opacity:0.28; transparent:true"
        animation="property:material.opacity; from:0.28; to:0.65; dur:900; loop:true; dir:alternate; easing:easeInOutSine"></a-plane>
      <a-plane rotation="-90 0 0" width="1.15" height="1.15"
        material="color:#beff00; opacity:0.6; wireframe:true; transparent:true"></a-plane>
      <a-text value="L" align="center" width="0.5" color="#beff00"
        rotation="-90 0 0" position="0 0.01 0" wrap-count="4"></a-text>
    </a-entity>

    <a-entity id="zone-R" class="interactive" position="1.9 0.02 -2.6">
      <a-plane rotation="-90 0 0" width="1.15" height="1.15"
        material="color:#00f4fe; opacity:0.28; transparent:true"
        animation="property:material.opacity; from:0.28; to:0.65; dur:1100; loop:true; dir:alternate; easing:easeInOutSine"></a-plane>
      <a-plane rotation="-90 0 0" width="1.15" height="1.15"
        material="color:#00f4fe; opacity:0.6; wireframe:true; transparent:true"></a-plane>
      <a-text value="R" align="center" width="0.5" color="#00f4fe"
        rotation="-90 0 0" position="0 0.01 0" wrap-count="4"></a-text>
    </a-entity>

    <!-- Tutor — Figma particle silhouette image -->
    <a-entity position="3.0 0.5 -3.5">
      <a-plane width="2.2" height="3.0"
        src="#img-tutor"
        material="shader:flat; transparent:true; alphaTest:0.05; opacity:0.88"></a-plane>
      <a-sphere radius="0.75" position="0 0.8 -0.1"
        material="color:#beff00; opacity:0.042; transparent:true; side:double"
        animation="property:scale; from:1 1 1; to:1.14 1.14 1.14; dur:2200; loop:true; dir:alternate"></a-sphere>
      <a-entity position="0 2.1 0">
        <a-plane width="0.7" height="0.13" material="color:#beff00; opacity:0.9; transparent:true"></a-plane>
        <a-text value="TUTOR" align="center" width="0.85" color="#0c0e12" position="0 0 0.01" wrap-count="8"></a-text>
      </a-entity>
    </a-entity>

    <!-- Session HUD overlay — Figma "Shuffling: Double Step  128 BPM" -->
    <a-entity position="-1.2 3.0 -4">
      <a-plane width="3.0" height="0.58"
        material="color:rgba(0,0,0,0.6); opacity:1; transparent:true"></a-plane>
      <a-plane width="3.0" height="0.58"
        material="color:rgba(190,255,0,0.28); opacity:1; transparent:true; wireframe:true"
        position="0 0 -0.002"></a-plane>
      <a-plane width="0.055" height="0.58"
        material="color:#beff00" position="-1.47 0 0.005"></a-plane>

<script>
const SCENES = ['begin','bubble','studio','replay'];
let current = 'begin';

function goScene(name) {
  SCENES.forEach(s => {
    const el = document.getElementById('scene-' + s);
    if (el) el.setAttribute('visible', s === name ? 'true' : 'false');
  });
  current = name;
  document.querySelectorAll('.nav-btn').forEach((btn, i) => {
    btn.classList.toggle('active', SCENES[i] === name);
  });
}

/* ── Interactivity component ─────────────────────────────── */
AFRAME.registerComponent('xr-interact', {
  init() {
    const el = this.el;
    el.addEventListener('mouseenter', () => {
      el.setAttribute('animation__scalein', {
        property: 'scale', to: '1.07 1.07 1.07',
        dur: 160, easing: 'easeOutQuad'
      });
    });
    el.addEventListener('mouseleave', () => {
      el.setAttribute('animation__scaleout', {
        property: 'scale', to: '1 1 1',
        dur: 160, easing: 'easeOutQuad'
      });
    });
    el.addEventListener('click', () => {
      const id = el.id;
      if (id === 'btn-begin-session')                         goScene('bubble');
      if (id === 'btn-confirm-bubble' || id === 'b-small' ||
          id === 'b-medium' || id === 'b-large')              goScene('studio');
      if (id === 'sc1' || id === 'sc2' || id === 'sc3') {
        const p = el.querySelector('a-plane');
        if (p) p.setAttribute('animation__flash', {
          property: 'scale', from:'1.05 1.05 1.05', to:'1 1 1',
          dur: 300, easing: 'easeOutBack'
        });
      }
      if (id === 'zone-L' || id === 'zone-R') {
        const p = el.querySelector('a-plane');
        if (p) p.setAttribute('animation__hit', {
          property: 'material.opacity', from: 1, to: 0.28,
          dur: 380, easing: 'easeOutQuad'
        });
      }
    });
  }
});

/* ── Attach interactivity to all .interactive ────────────── */
function wire() {
  document.querySelectorAll('.interactive').forEach(el => {
    if (!el.components['xr-interact']) {
      el.setAttribute('xr-interact', '');
    }
  });
}

/* ── Build star field ────────────────────────────────────── */
function buildStars() {
  const c = document.getElementById('stars');
  const colors = ['#beff00','#00f4fe','#ffffff','#c3caad'];
  for (let i = 0; i < 55; i++) {
    const s = document.createElement('a-sphere');
    const t = Math.random() * Math.PI * 2;
    const p = Math.acos(2 * Math.random() - 1);
    const r = 14 + Math.random() * 8;
    s.setAttribute('position', {
      x: r * Math.sin(p) * Math.cos(t),
      y: r * Math.sin(p) * Math.sin(t),
      z: r * Math.cos(p)
    });
    s.setAttribute('radius', 0.01 + Math.random() * 0.028);
    s.setAttribute('material', {
      color: colors[~~(Math.random() * colors.length)],
      opacity: 0.18 + Math.random() * 0.55,
      transparent: true, shader: 'flat'
    });
    s.setAttribute('animation', {
      property: 'material.opacity',
      from: (0.15 + Math.random() * 0.5).toFixed(2),
      to: 0.03, dur: 2500 + Math.random() * 5000,
      loop: true, dir: 'alternate', easing: 'easeInOutSine'
    });
    c.appendChild(s);
  }
}

document.querySelector('a-scene').addEventListener('loaded', () => {
  buildStars();
  wire();
  goScene('begin');
});
</script>
