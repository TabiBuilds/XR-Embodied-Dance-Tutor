<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>KINETIC XR — User Flow 1: Entering & Calibrating the Haptic Bubble</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0c0e12; font-family: 'Space Grotesk', sans-serif; overflow: hidden; }

    /* ── Top bar ── */
    #topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 999;
      display: flex; align-items: center;
      padding: 0 20px;
      height: 48px;
      background: rgba(12,14,18,0.88);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(190,255,0,0.18);
      gap: 10px;
    }
    .brand {
      color: #beff00; font-size: 14px; font-weight: 700;
      letter-spacing: -0.5px; text-transform: uppercase;
      margin-right: 8px; white-space: nowrap;
    }
    .flow-title {
      color: rgba(195,202,173,0.55); font-size: 10px;
      letter-spacing: 1.2px; text-transform: uppercase;
      flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── Step progress ── */
    #steps {
      display: flex; align-items: center; gap: 4px;
    }
    .step-dot {
      width: 22px; height: 22px; border-radius: 50%;
      border: 1.5px solid rgba(190,255,0,0.3);
      background: transparent; color: rgba(195,202,173,0.45);
      font-size: 9px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.25s; font-family: 'Space Grotesk', sans-serif;
      letter-spacing: 0; text-transform: none;
    }
    .step-dot.active {
      border-color: #beff00; background: rgba(190,255,0,0.2);
      color: #beff00;
    }
    .step-dot.done {
      border-color: rgba(190,255,0,0.4); background: rgba(190,255,0,0.08);
      color: rgba(190,255,0,0.6);
    }
    .step-line {
      width: 16px; height: 1px;
      background: rgba(190,255,0,0.2);
    }
    .step-line.done { background: rgba(190,255,0,0.45); }

    /* ── Nav arrows ── */
    .nav-arr {
      padding: 4px 12px; border-radius: 16px; cursor: pointer;
      font-size: 11px; font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      border: 1px solid rgba(190,255,0,0.3);
      background: transparent; color: rgba(190,255,0,0.65);
      transition: all 0.2s; white-space: nowrap;
    }
    .nav-arr:hover { background: rgba(190,255,0,0.12); color: #beff00; }
    .nav-arr.primary {
      background: rgba(190,255,0,0.85); color: #0c0e12;
      border-color: #beff00; font-weight: 700;
    }
    .nav-arr.primary:hover { background: #beff00; }
    #btn-prev { margin-left: 8px; }

    /* ── Hint ── */
    #hint {
      position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
      z-index: 999; pointer-events: none;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.07); border-radius: 8px;
      padding: 6px 16px; color: rgba(195,202,173,0.55); font-size: 10px;
      letter-spacing: 0.05em; white-space: nowrap;
    }

    /* ── Step label overlay ── */
    #step-label {
      position: fixed; bottom: 44px; left: 50%; transform: translateX(-50%);
      z-index: 999; pointer-events: none;
      color: rgba(190,255,0,0.7); font-size: 11px;
      letter-spacing: 1.4px; text-transform: uppercase;
      font-family: 'Space Grotesk', sans-serif; font-weight: 600;
    }
  </style>
</head>
<body>

<!-- Top bar -->
<div id="topbar">
  <span class="brand">KINETIC XR</span>
  <span class="flow-title">User Flow 1: Entering &amp; Calibrating the Haptic Bubble</span>
  <div id="steps">
    <!-- filled by JS -->
  </div>
  <button class="nav-arr" id="btn-prev" onclick="prevStep()">← Back</button>
  <button class="nav-arr primary" id="btn-next" onclick="nextStep()">Next →</button>
</div>
<div id="step-label"></div>
<div id="hint">🖱 Drag to look around &nbsp;·&nbsp; Click highlighted objects &nbsp;·&nbsp; WASD to move</div>

          position="0 0 0.01" wrap-count="16"></a-text>
      </a-entity>
    </a-entity>

    <!-- Figma: "Footer - Persistent Spatial HUD Panel (Bottom)" -->
    <a-entity position="0 0.22 -3.8">
      <a-plane width="5.0" height="0.38"
        material="color:rgba(17,19,23,0.6); opacity:1; transparent:true"></a-plane>
      <a-plane width="5.0" height="0.38"
        material="color:rgba(255,255,255,0.2); opacity:1; transparent:true; wireframe:true"
        position="0 0 -0.002"></a-plane>
      <!-- Left: Environment -->
      <a-text value="ENVIRONMENT" align="left" width="0.9" color="#c3caad" position="-2.2 0.08 0.01" wrap-count="14"></a-text>
      <a-text value="Synthetic Garden" align="left" width="1.2" color="#ffffff" position="-2.2 -0.08 0.01" wrap-count="18"></a-text>
      <!-- Divider -->
      <a-plane width="0.01" height="0.24" material="color:rgba(255,255,255,0.1)" position="-1.3 0 0.01"></a-plane>
      <!-- Battery -->
      <a-text value="BATTERY" align="left" width="0.75" color="#c3caad" position="-1.15 0.08 0.01" wrap-count="10"></a-text>
      <a-text value="92%" align="left" width="0.75" color="#b8f600" position="-1.15 -0.08 0.01" wrap-count="6"></a-text>
      <!-- Right: Rhythm sync bars -->
      <a-text value="RHYTHM SYNC" align="right" width="1.4" color="rgba(255,255,255,0.55)" position="0.8 0 0.01" wrap-count="14"></a-text>
      <!-- 5 bars: 3 active (lime), 2 dim -->
      <a-plane width="0.055" height="0.18" material="color:#b8f600" position="1.68 0 0.01"></a-plane>
      <a-plane width="0.055" height="0.18" material="color:#b8f600" position="1.78 0 0.01"></a-plane>
      <a-plane width="0.055" height="0.18" material="color:#b8f600" position="1.88 0 0.01"></a-plane>
      <a-plane width="0.055" height="0.18" material="color:rgba(184,246,0,0.18)" position="1.98 0 0.01"></a-plane>
      <a-plane width="0.055" height="0.18" material="color:rgba(184,246,0,0.18)" position="2.08 0 0.01"></a-plane>
    </a-entity>

  </a-entity>


  <!-- ══════════════════════════════════════════════════════
       STEP 6: CONFIRMATION — BUBBLE ACTIVE & ENTERING XR
       (Figma: 229:1652 — final state before entering the bubble)
  ══════════════════════════════════════════════════════════ -->
  <a-entity id="step-6" visible="false">
    <a-sky color="#05060f"></a-sky>

    <!-- The haptic bubble — fully visible, surrounds user -->
    <a-sphere position="0 1.4 0" radius="2.4"
      material="color:#beff00; opacity:0.055; transparent:true; side:double"
      animation="property:scale; from:0.1 0.1 0.1; to:1 1 1; dur:1800; easing:easeOutBack"></a-sphere>
    <!-- Outer pulse shells -->
    <a-torus position="0 1.4 0" radius="2.4" radius-tubular="0.018"
      color="#beff00" opacity="0.32"
      animation="property:rotation; to:0 360 0; dur:20000; loop:true; easing:linear"
      animation__p="property:material.opacity; from:0.32; to:0.62; dur:2000; loop:true; dir:alternate"></a-torus>
    <a-torus position="0 1.4 0" radius="2.4" radius-tubular="0.013"
      color="#00f4fe" opacity="0.18" rotation="90 0 0"
      animation="property:rotation; to:90 0 360; dur:28000; loop:true; easing:linear"></a-torus>
    <!-- Inner equator ring -->
    <a-torus position="0 1.4 0" radius="2.4" radius-tubular="0.008"
      color="#beff00" opacity="0.12" rotation="45 0 0"
      animation="property:rotation; to:45 0 360; dur:35000; loop:true; easing:linear"></a-torus>

    <!-- Central confirmation panel -->
    <a-entity position="0 1.6 -3.6">
      <a-plane width="3.2" height="2.0"
        material="color:#111317; opacity:0.88; transparent:true"
        animation="property:scale; from:0.4 0.4 0.4; to:1 1 1; dur:1200; easing:easeOutBack; delay:400"></a-plane>
      <a-plane width="3.22" height="2.02"
        material="color:rgba(255,255,255,0.06); transparent:true; wireframe:true"
        position="0 0 -0.003"></a-plane>

      <!-- Check badge: CALIBRATION COMPLETE -->
      <a-plane width="1.4" height="0.135"
        material="color:rgba(184,246,0,0); transparent:true"
        position="0 0.82 0.01"></a-plane>
      <a-text value="CALIBRATION COMPLETE" align="center" width="1.6" color="#b8f600"
        position="0 0.82 0.02" wrap-count="26"></a-text>

      <a-text value="Bubble Active" align="center" width="4" color="#ffffff"
        position="0 0.52 0.02" wrap-count="18"></a-text>

      <a-text value="Your kinetic spatial field is now fully synchronized.&#10;Precision tracking is active within the virtual perimeter."
        align="center" width="3.0" color="#c3caad"
        position="0 0.12 0.02" wrap-count="46"></a-text>

      <!-- Stats row -->
      <a-entity position="-0.9 -0.32 0.02">
        <a-text value="BUBBLE SIZE" align="center" width="1.0" color="rgba(195,202,173,0.55)" position="0 0.1 0" wrap-count="14"></a-text>
        <a-text value="MEDIUM" align="center" width="1.0" color="#beff00" position="0 -0.08 0" wrap-count="10"></a-text>
      </a-entity>
      <a-entity position="0 -0.32 0.02">
        <a-text value="SYNC QUALITY" align="center" width="1.1" color="rgba(195,202,173,0.55)" position="0 0.1 0" wrap-count="14"></a-text>
        <a-text value="100%" align="center" width="1.0" color="#beff00" position="0 -0.08 0" wrap-count="8"></a-text>
      </a-entity>
      <a-entity position="0.9 -0.32 0.02">
        <a-text value="LATENCY" align="center" width="1.0" color="rgba(195,202,173,0.55)" position="0 0.1 0" wrap-count="12"></a-text>
        <a-text value="12 ms" align="center" width="1.0" color="#00f4fe" position="0 -0.08 0" wrap-count="8"></a-text>
      </a-entity>

      <!-- ENTER THE BUBBLE final CTA -->
      <a-entity id="s6-enter" class="interactive" position="0 -0.78 0.02">
        <!-- Glow behind button -->
        <a-plane width="2.8" height="0.32"
          material="color:#beff00; opacity:0.12; transparent:true"
          position="0 0 -0.02"
          animation="property:material.opacity; from:0.12; to:0.3; dur:1200; loop:true; dir:alternate"></a-plane>
        <a-plane width="2.8" height="0.32"
          material="color:#beff00; opacity:0.88; transparent:true"></a-plane>
        <a-text value="ENTER THE BUBBLE" align="center" width="3.4" color="#0c0e12"
          position="0 0 0.01" wrap-count="22"></a-text>
      </a-entity>
    </a-entity>

    <!-- Environment floor glow -->
    <a-plane rotation="-90 0 0" width="8" height="8"
      material="color:#beff00; opacity:0.04; transparent:true"
      position="0 0.01 -2"
      animation="property:material.opacity; from:0.04; to:0.1; dur:2500; loop:true; dir:alternate"></a-plane>

    <!-- "You are now inside the haptic bubble" spatial text behind user -->
    <a-entity position="0 2.5 3" rotation="0 180 0">
      <a-text value="YOU ARE NOW INSIDE THE HAPTIC BUBBLE"
        align="center" width="4" color="rgba(190,255,0,0.35)" wrap-count="40"></a-text>
    </a-entity>

  </a-entity>


  <!-- ── Camera ── -->
  <a-entity id="rig">
    <a-camera id="cam"
      look-controls="reverseMouseDrag: false; touchEnabled: true"
      wasd-controls="acceleration: 18"
      position="0 1.6 0"
    >
      <a-entity
        cursor="rayOrigin: mouse; fuse: false"
        raycaster="objects: .interactive; far: 22; interval: 80"
        geometry="primitive: ring; radiusInner: 0.007; radiusOuter: 0.012"
        material="color: #beff00; shader: flat; opacity: 0.85"
        position="0 0 -1"
        animation__e="property: material.color; startEvents: mouseenter; to: #ffffff; dur: 120"
        animation__l="property: material.color; startEvents: mouseleave; to: #beff00; dur: 120"
        animation__c="property: scale; startEvents: click; from: 0.4 0.4 0.4; to: 1 1 1; dur: 200"
      ></a-entity>
    </a-camera>
  </a-entity>

</a-scene>

<!-- ═══════════════════════════════════════════════════════ -->
<script>
// ── Step config ──────────────────────────────────────────
const STEPS = [
  { id: 'step-1', label: 'Welcome & Sign In' },
  { id: 'step-2', label: 'Learning Mode Setup' },
  { id: 'step-3', label: 'Begin Lesson' },
  { id: 'step-4', label: 'Haptics Calibration' },
  { id: 'step-5', label: 'Sensory Preview' },
  { id: 'step-6', label: 'Bubble Active' },
];
let current = 0;

// ── Build step indicator ─────────────────────────────────
function buildSteps() {
  const cont = document.getElementById('steps');
  cont.innerHTML = '';
  STEPS.forEach((s, i) => {
    if (i > 0) {
      const line = document.createElement('div');
      line.className = 'step-line' + (i <= current ? ' done' : '');
      line.id = 'sline-' + i;
      cont.appendChild(line);
    }
    const dot = document.createElement('div');
    dot.className = 'step-dot' + (i === current ? ' active' : i < current ? ' done' : '');
    dot.textContent = i + 1;
    dot.title = s.label;
    dot.onclick = () => goStep(i);
    dot.id = 'sdot-' + i;
    cont.appendChild(dot);
  });
}

function updateStepUI() {
  STEPS.forEach((_, i) => {
    const dot = document.getElementById('sdot-' + i);
    if (dot) {
      dot.className = 'step-dot' + (i === current ? ' active' : i < current ? ' done' : '');
    }
    if (i > 0) {
      const line = document.getElementById('sline-' + i);
      if (line) line.className = 'step-line' + (i <= current ? ' done' : '');
    }
  });
  document.getElementById('step-label').textContent =
    `Step ${current + 1} of ${STEPS.length}  ·  ${STEPS[current].label}`;
  document.getElementById('btn-prev').style.opacity = current === 0 ? '0.35' : '1';
  const nxt = document.getElementById('btn-next');
  nxt.textContent = current === STEPS.length - 1 ? 'Finish ✓' : 'Next →';
}

// ── Navigate ─────────────────────────────────────────────
function goStep(n) {
  if (n < 0 || n >= STEPS.length) return;
  document.getElementById(STEPS[current].id).setAttribute('visible', 'false');
  current = n;
  document.getElementById(STEPS[current].id).setAttribute('visible', 'true');
  updateStepUI();
}
function nextStep() { if (current < STEPS.length - 1) goStep(current + 1); }
function prevStep() { if (current > 0) goStep(current - 1); }

// ── Interactivity component ──────────────────────────────
AFRAME.registerComponent('xr-btn', {
  init() {
    const el = this.el;
    el.addEventListener('mouseenter', () => {
      el.setAttribute('animation__si', { property: 'scale', to: '1.07 1.07 1.07', dur: 150, easing: 'easeOutQuad' });
    });
    el.addEventListener('mouseleave', () => {
      el.setAttribute('animation__so', { property: 'scale', to: '1 1 1', dur: 150, easing: 'easeOutQuad' });
    });
    el.addEventListener('click', () => {
      const id = el.id;
      if (id === 's1-signin')   nextStep();
      if (id === 's2-xr')       nextStep();
      if (id === 's2-ai')       nextStep();
      if (id === 's3-begin')    nextStep();
      if (id === 's4-next')     nextStep();
      if (id === 's5-begin')    nextStep();
      if (id === 's5-recal')    goStep(3);  // back to calibration
      if (id === 's6-enter') {
        // Final — pulse the bubble
        const bubble = document.querySelector('#step-6 a-sphere');
        if (bubble) bubble.setAttribute('animation__final', {
          property: 'material.opacity', from: 0.055, to: 0.25,
          dur: 600, easing: 'easeOutQuad', dir: 'alternate', loop: 3
        });
      }
    });
  }
});

// ── Wire interactivity ───────────────────────────────────
function wire() {
  document.querySelectorAll('.interactive').forEach(el => {
    if (!el.components['xr-btn']) el.setAttribute('xr-btn', '');
  });
}

// ── Star field ───────────────────────────────────────────
function buildStars() {
  const c = document.getElementById('stars');
  const cols = ['#beff00','#00f4fe','#a3e635','#ffffff'];
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('a-sphere');
    const t = Math.random() * Math.PI * 2;
    const p = Math.acos(2 * Math.random() - 1);
    const r = 14 + Math.random() * 9;
    s.setAttribute('position', {
      x: r * Math.sin(p) * Math.cos(t),
      y: r * Math.sin(p) * Math.sin(t),
      z: r * Math.cos(p)
    });
    s.setAttribute('radius', 0.01 + Math.random() * 0.028);
    s.setAttribute('material', {
      color: cols[~~(Math.random() * cols.length)],
      opacity: 0.15 + Math.random() * 0.5,
      transparent: true, shader: 'flat'
    });
    s.setAttribute('animation', {
      property: 'material.opacity',
      from: (0.12 + Math.random() * 0.45).toFixed(2),
      to: 0.02, dur: 2500 + Math.random() * 5500,
      loop: true, dir: 'alternate', easing: 'easeInOutSine'
    });
    c.appendChild(s);
  }
}

// ── Init ─────────────────────────────────────────────────
document.querySelector('a-scene').addEventListener('loaded', () => {
  buildStars();
  buildSteps();
  updateStepUI();
  wire();
  goStep(0);
});
</script>
</body>
</html>
